name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Install pdfcpu
        run: |
          curl -L -o pdfcpu.tar.gz https://github.com/pdfcpu/pdfcpu/releases/download/v0.6.0/pdfcpu_linux_amd64.tar.gz
          mkdir -p /usr/local/bin
          tar -xzf pdfcpu.tar.gz -C /usr/local/bin
          chmod +x /usr/local/bin/pdfcpu
          rm pdfcpu.tar.gz
          pdfcpu --version

      - name: Run tests
        run: go test ./... -v

      - name: Build
        run: go build -o go-pdf .